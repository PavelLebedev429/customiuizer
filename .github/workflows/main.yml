name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Force create keystore properties everywhere
        run: |
          echo "storeFile=fake" > keystore.properties
          echo "storePassword=fake" >> keystore.properties
          echo "keyAlias=fake" >> keystore.properties
          echo "keyPassword=fake" >> keystore.properties
          mkdir -p app
          cp keystore.properties app/keystore.properties

      - name: Patch compileSdk target
        run: |
          if [ -f "app/build.gradle" ]; then
            sed -i 's/compileSdk.*/compileSdk 34/g' app/build.gradle
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fixed-mod-apk
          path: "**/build/outputs/apk/debug/*.apk"
