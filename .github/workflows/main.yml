name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Создаем файл keystore в корне раннера (уже проверено, работает)
      - name: Force create keystore properties in runner root
        run: |
          echo "storeFile=fake" > ../keystore.properties
          echo "storePassword=fake" >> ../keystore.properties
          echo "keyAlias=fake" >> ../keystore.properties
          echo "keyPassword=fake" >> ../keystore.properties
          cp ../keystore.properties ./keystore.properties
          mkdir -p app
          cp ../keystore.properties app/keystore.properties

      # ПРИНУДИТЕЛЬНО выставляем compileSdk 36 (Android 16), как требует libxposed в логе
      - name: Patch compileSdk target to Android 16
        run: |
          if [ -f "app/build.gradle" ]; then
            sed -i '/compileSdk/d' app/build.gradle
            sed -i 's/android {/android {\n    compileSdk 36/g' app/build.gradle
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fixed-mod-apk
          path: "**/build/outputs/apk/release/*.apk"
